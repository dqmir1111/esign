<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dqmjrka | ESign</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-sub: #8e8e93;
            --blue-btn: #007aff;
            --border-color: #e5e5ea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            /* Шрифт максимально похожий на Шедеврум (Inter/System Black) */
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 25px;
            gap: 8px;
            animation: slideUp 0.5s ease;
        }

        .profile-header h1 {
            font-size: 32px; /* Увеличил размер как на фото */
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* Красивая галочка */
        .verified-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: #007aff;
            border-radius: 50%;
            position: relative;
        }

        .verified-badge::after {
            content: '';
            width: 6px;
            height: 11px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        .section-block {
            background: var(--card-bg);
            border-radius: 20px; /* Более мягкие углы */
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            animation: slideUp 0.6s ease backwards;
            overflow: hidden;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        .project {
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .project h3 { font-size: 17px; font-weight: 700; }
        
        .dl-icon { 
            width: 28px; 
            height: 28px;
            opacity: 0.8;
        }

        /* App Row */
        .app-row {
            display: flex;
            align-items: center;
            padding: 18px;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
        }

        .app-row:active { background-color: #f9f9f9; }

        .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            border: 0.5px solid var(--border-color);
            margin-right: 15px;
            object-fit: cover;
        }

        .app-text { flex: 1; display: flex; flex-direction: column; }
        
        .app-title { 
            font-size: 19px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }

        /* Разноцветная надпись АКТУАЛЕН */
        .status-rainbow {
            font-size: 12px;
            font-weight: 900;
            margin-top: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #00ff00, #0000ff, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .app-sub { 
            font-size: 13px; 
            color: var(--text-sub); 
            margin-top: 2px;
            font-weight: 600;
        }

        .app-action {
            background: #000; /* В стиле Шедеврум кнопки часто черные или яркие */
            color: #fff;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
        }

        /* Текст под есигном */
        .info-caption {
            font-size: 13px;
            color: var(--text-sub);
            padding: 0 18px 15px 18px;
            font-weight: 500;
            line-height: 1.4;
        }

        /* Соцсети */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .social-btn {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.2s;
            animation: slideUp 0.7s ease backwards;
        }

        .social-btn:active { transform: scale(0.95); }

        .social-btn img {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-header">
            <h1>dqmjrka</h1>
            <div class="verified-badge"></div>
        </div>

        <div class="section-block delay-1">
            <a href="https://github.com/dns-khoindvn/top-country-stats/releases/download/DNS/khoindvn.io.vn.mobileconfig" class="project">
                <h3>Download DNS Profile</h3>
                <img src="https://cdn-icons-png.flaticon.com/512/8244/8244469.png" alt="Download" class="dl-icon">
            </a>
        </div>

        <div class="section-block delay-2">
            <a href="https://api.khoindvn.io.vn/eQDb5c" class="app-row" target="_blank">
                <img src="IMG_0802.jpeg" class="app-icon" alt="ESign">
                <div class="app-text">
                    <div class="app-title">ESign</div>
                    <div class="status-rainbow">АКТУАЛЕН 10.05.2026</div>
                </div>
                <div class="app-action">Скачать</div>
            </a>
            <div class="info-caption">
                СЕРТИФИКАТА НЕТ! ТЕПЕРЬ В САМОМ ЕСИГН НЕ НУЖЕН
            </div>
        </div>

        <div class="social-grid">
            <a href="https://t.me/podval_dqmira" class="social-btn delay-3" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Telegram_2019_Logo.svg/250px-Telegram_2019_Logo.svg.png" alt="TG">
                Telegram
            </a>
            <a href="https://tiktok.com/@dqmir1111" class="social-btn delay-3" target="_blank">
                <img src="https://sf-static.tiktokcdn.com/obj/eden-sg/uhtyvueh7nulogpoguhm/tiktok-icon2.png" alt="TT">
                TikTok
            </a>
        </div>
    </div>

</body>
</html>
